name: Parse PR Metadata Checklist

on:
  pull_request:
    types: [opened, edited]

# If the user edits the PR (re-triggering this workflow) while a
# previous run for the SAME pull request is still in progress, cancel
# that previous run instead of letting both finish. Runs are grouped
# by workflow name + PR number, so different PRs never cancel each
# other - only successive runs on the same PR do.
concurrency:
  group: parse-pr-metadata-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  parse-metadata:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read

    steps:
      # Works for BOTH "opened" and "edited" automatically:
      # - on "opened", github.event.pull_request.body is the body as
      #   first submitted (default checkboxes/values, unless edited
      #   before creating).
      # - on "edited", github.event.pull_request.body is the NEW body
      #   after the user's edit (e.g. after they checked a box or
      #   typed a PR number).
      # No branching needed - the payload always reflects the body
      # relevant to whichever event just fired.
      - name: Write PR body to file
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s\n' "$PR_BODY" > pr_body.md

      # Pure awk/grep regex parsing, no external script file.
      #
      # Supports two kinds of "### " sections under "## Metadata":
      #   1. Checkbox sections:
      #        ### test_type (select one or more)
      #        - [x] all
      #        - [ ] authentication
      #      -> collects comma-joined labels of all "[x]" lines.
      #   2. Inline free-text fields:
      #        ### related_pr_id: 123
      #      -> everything after the first ":" on the heading line
      #         itself is taken as the literal value. No checkbox
      #         lines are expected or scanned for this kind of section.
      - name: Parse checklist metadata (regex)
        id: parse
        run: |
          scoped="$(awk '
            BEGIN { in_section = 0; found = 0 }
            /^##[[:space:]]+Metadata[[:space:]]*$/ { in_section = 1; found = 1; next }
            in_section && /^##[[:space:]]+/ { in_section = 0 }
            in_section { print }
            END { if (!found) exit 1 }
          ' pr_body.md 2>/dev/null || cat pr_body.md)"

          parsed="$(echo "$scoped" | awk '
            function slugify(s) {
              gsub(/\([^)]*\)[[:space:]]*$/, "", s)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", s)
              gsub(/[^A-Za-z0-9]+/, "_", s)
              gsub(/^_+|_+$/, "", s)
              return tolower(s)
            }
            function trim(s) {
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", s)
              return s
            }
            /^###[[:space:]]+/ {
              if (key != "") print key "|" checked
              raw = $0
              sub(/^###[[:space:]]+/, "", raw)

              if (raw ~ /:/) {
                colon_pos = index(raw, ":")
                head = substr(raw, 1, colon_pos - 1)
                val  = substr(raw, colon_pos + 1)
                key = slugify(head)
                checked = trim(val)
                print key "|" checked
                key = ""
                checked = ""
                next
              }

              key = slugify(raw)
              checked = ""
              next
            }
            /^[-*][[:space:]]+\[[xX]\][[:space:]]+/ {
              label = $0
              sub(/^[-*][[:space:]]+\[[xX]\][[:space:]]+/, "", label)
              gsub(/[[:space:]]+$/, "", label)
              checked = (checked == "" ? label : checked "," label)
            }
            END {
              if (key != "") print key "|" checked
            }
          ')"

          echo "Parsed sections:"
          echo "$parsed"

          json="{"
          first=true
          while IFS='|' read -r key value; do
            [ -z "$key" ] && continue

            {
              echo "${key}<<EOF"
              echo "$value"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

            IFS=',' read -ra items <<< "$value"
            arr="["
            afirst=true
            for item in "${items[@]}"; do
              [ -z "$item" ] && continue
              if [ "$afirst" = true ]; then afirst=false; else arr="$arr,"; fi
              esc="${item//\"/\\\"}"
              arr="$arr\"$esc\""
            done
            arr="$arr]"

            if [ "$first" = true ]; then first=false; else json="$json,"; fi
            json="$json\"$key\":$arr"
          done <<< "$parsed"
          json="$json}"

          {
            echo "metadata_json<<EOF"
            echo "$json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # --- Example consumption of the parsed values ---
      # steps.parse.outputs.test_tags        -> comma-joined string, e.g. "@smoke,@authentication"
      # steps.parse.outputs.test_type        -> comma-joined string, e.g. "authentication"
      # steps.parse.outputs.related_pr_id    -> literal typed value, e.g. "123"
      # steps.parse.outputs.metadata_json    -> full JSON blob for fromJSON() use

      - name: Show parsed values (debug)
        run: |
          echo "event:           ${{ github.event.action }}"
          echo "test_tags:       ${{ steps.parse.outputs.test_tags }}"
          echo "test_type:       ${{ steps.parse.outputs.test_type }}"
          echo "related_pr_id:   ${{ steps.parse.outputs.related_pr_id }}"
          echo "full json:       ${{ steps.parse.outputs.metadata_json }}"

      # Example: fail loudly if a required field is empty, instead of
      # silently defaulting. Remove/adjust as needed.
      - name: Validate required fields
        if: steps.parse.outputs.test_type == ''
        run: |
          echo "::error::No 'test_type' checkbox is selected in the PR description. Please check at least one option under '### test_type'."
          exit 1

    outputs:
      test_tags: ${{ steps.parse.outputs.test_tags }}
      test_type: ${{ steps.parse.outputs.test_type }}
      related_pr_id: ${{ steps.parse.outputs.related_pr_id }}
      metadata_json: ${{ steps.parse.outputs.metadata_json }}

  # Example downstream job consuming the parsed metadata
  run-tests:
    needs: parse-metadata
    runs-on: ubuntu-latest
    steps:
      - name: Use parsed metadata
        run: |
          echo "Will run with test_type=${{ needs.parse-metadata.outputs.test_type }}"
          echo "Tags selected: ${{ needs.parse-metadata.outputs.test_tags }}"
          echo "Related PR id: ${{ needs.parse-metadata.outputs.related_pr_id }}"
